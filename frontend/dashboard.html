<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronin Chopsticks — Dashboard</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff0000">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="js/theme.js"></script>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="images/logo-circle.png" alt="Logo">
            <span>Ronin<br>Chopsticks</span>
        </div>
        <nav class="sidebar-nav">
            <p class="nav-label">Main Menu</p>
            <a href="dashboard.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Dashboard
            </a>
            <a href="pos.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 7H6a2 2 0 00-2 2v9a2 2 0 002 2h12a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1-4H8m4 0v4m0-4a1 1 0 110 2 1 1 0 010-2z"/>
                </svg>
                POS Terminal
            </a>
            <a href="products.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
                </svg>
                Products
            </a>
            <a href="inventory.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                Inventory
            </a>
            <a href="customers.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Customers
            </a>
            <a href="reports.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Reports
            </a>
            <a href="receipts.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Receipts
            </a>
            <div id="adminMenu" style="display:none;">
                <p class="nav-label">Admin</p>
                <a href="users.html" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    User Management
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Admin</div>
                    <div class="user-role" id="userRole">admin</div>
                </div>
                <a href="settings.html" style="color:#888;display:flex;
                    align-items:center;padding:4px;transition:color 0.2s;
                    text-decoration:none;" title="Settings">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </a>
                <button class="btn-logout" onclick="logout()" title="Logout">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title" id="welcomeMsg">Welcome back!</span>
            <div class="topbar-right">
                <span style="font-size:13px;color:#888;" id="todayDate"></span>
                <button id="themeToggle" onclick="toggleTheme()"
                    style="background:none;border:1.5px solid #e0e0e0;
                    border-radius:8px;padding:7px 10px;cursor:pointer;
                    display:flex;align-items:center;color:var(--gray-dark);
                    transition:all 0.2s;"
                    title="Toggle dark mode">
                </button>
            </div>
        </div>

        <div class="page-content">

            <div id="roleBanner" style="margin-bottom:20px;padding:14px 20px;
                border-radius:12px;display:flex;align-items:center;gap:12px;">
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="todayRevenue">GHS 0</div>
                        <div class="stat-label">Today's Revenue</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="todaySales">0</div>
                        <div class="stat-label">Today's Sales</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01M12 3a9 9 0 100 18A9 9 0 0012 3z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="lowStockCount">0</div>
                        <div class="stat-label">Low Stock Alerts</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalCustomers">0</div>
                        <div class="stat-label">Total Customers</div>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-bottom:20px;">
                <div class="card-header">
                    <span class="card-title">Quick Actions</span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;"
                    id="quickActions">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Revenue This Week</span>
                    </div>
                    <div style="position:relative;height:220px;">
                        <canvas id="weekChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Recent Sales</span>
                    </div>
                    <div id="recentSalesList" style="font-size:13px;">
                        <p style="color:#aaa;text-align:center;padding:20px;">
                            No sales yet today.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const token = localStorage.getItem('pos_token');
const user  = JSON.parse(localStorage.getItem('pos_user') || '{}');
if (!token) window.location.href = 'index.html';
if (user.role === 'cashier') window.location.href = 'pos.html';

const API     = 'http://localhost:3000/api';
const headers = () => ({
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
});

document.getElementById('userAvatar').textContent = (user.username||'A')[0].toUpperCase();
document.getElementById('userName').textContent   = user.username || 'User';
document.getElementById('userRole').textContent   = user.role || 'staff';
document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.username}!`;
document.getElementById('todayDate').textContent  =
    new Date().toLocaleDateString('en-GB', {
        weekday:'long', year:'numeric', month:'long', day:'numeric'
    });

if (user.role === 'admin') {
    document.getElementById('adminMenu').style.display = 'block';
}

const banners = {
    admin:   { bg:'#fff0f0', color:'#ff0000', icon:'👑', text:'Administrator — Full system access' },
    manager: { bg:'#eaf4fb', color:'#2980b9', icon:'📊', text:'Manager — Reports, products and inventory access' }
};
const b = banners[user.role];
if (b) {
    document.getElementById('roleBanner').style.background = b.bg;
    document.getElementById('roleBanner').innerHTML = `
        <span style="font-size:22px;">${b.icon}</span>
        <span style="font-size:13.5px;font-weight:600;color:${b.color};">${b.text}</span>`;
}

const allActions = [
    { label:'New Sale',  icon:'🧾', href:'pos.html',       roles:['admin','manager','cashier'] },
    { label:'Products',  icon:'📦', href:'products.html',  roles:['admin','manager'] },
    { label:'Inventory', icon:'📊', href:'inventory.html', roles:['admin','manager'] },
    { label:'Customers', icon:'👥', href:'customers.html', roles:['admin','manager'] },
    { label:'Reports',   icon:'📈', href:'reports.html',   roles:['admin','manager'] },
    { label:'Users',     icon:'🔐', href:'users.html',     roles:['admin'] },
];

document.getElementById('quickActions').innerHTML =
    allActions.filter(a => a.roles.includes(user.role)).map(a => `
        <a href="${a.href}" style="display:flex;flex-direction:column;align-items:center;
            gap:8px;padding:16px;background:#f9f9f9;border-radius:10px;
            text-decoration:none;transition:all 0.2s;border:1.5px solid #ebebeb;"
            onmouseover="this.style.borderColor='#ff0000';this.style.background='#fff0f0'"
            onmouseout="this.style.borderColor='#ebebeb';this.style.background='#f9f9f9'">
            <span style="font-size:26px;">${a.icon}</span>
            <span style="font-size:12px;font-weight:600;color:#333;">${a.label}</span>
        </a>`
    ).join('');

async function loadStats() {
    try {
        const salesRes = await fetch(`${API}/reports/summary?days=1`, { headers: headers() });
        const sales    = await salesRes.json();
        document.getElementById('todayRevenue').textContent =
            `GHS ${parseFloat(sales.total_revenue || 0).toFixed(2)}`;
        document.getElementById('todaySales').textContent = sales.total_sales || 0;

        const prodRes  = await fetch(`${API}/products`, { headers: headers() });
        const products = await prodRes.json();
        document.getElementById('lowStockCount').textContent =
            products.filter(p => p.quantity <= 5).length;

        const custRes   = await fetch(`${API}/customers`, { headers: headers() });
        const customers = await custRes.json();
        document.getElementById('totalCustomers').textContent = customers.length;

        loadWeekChart();
        loadRecentSales();
    } catch (err) {
        console.log('Could not load stats:', err);
    }
}

async function loadWeekChart() {
    try {
        const res  = await fetch(`${API}/reports/daily?days=7`, { headers: headers() });
        const data = await res.json();
        new Chart(document.getElementById('weekChart'), {
            type: 'bar',
            data: {
                labels: data.map(d => d.day),
                datasets: [{
                    label: 'Revenue (GHS)',
                    data:  data.map(d => parseFloat(d.revenue)),
                    backgroundColor: 'rgba(255,0,0,0.15)',
                    borderColor: '#ff0000',
                    borderWidth: 2,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color:'#888', font:{ size:10 } }, grid: { display:false } },
                    y: { ticks: { color:'#888', font:{ size:10 }, callback: v => 'GHS ' + v },
                         grid: { color:'rgba(0,0,0,0.05)' } }
                }
            }
        });
    } catch { console.log('Could not load week chart.'); }
}

async function loadRecentSales() {
    try {
        const res  = await fetch(`${API}/sales`, { headers: headers() });
        const data = await res.json();
        const list = document.getElementById('recentSalesList');
        if (!data.length) {
            list.innerHTML = `<p style="color:#aaa;text-align:center;padding:20px;">No sales yet.</p>`;
            return;
        }
        list.innerHTML = data.slice(0, 6).map(s => `
            <div style="display:flex;justify-content:space-between;align-items:center;
                padding:10px 0;border-bottom:1px solid #f5f5f5;">
                <div>
                    <div style="font-weight:600;font-size:13px;">${s.username || 'Unknown'}</div>
                    <div style="font-size:11px;color:#aaa;">${new Date(s.date).toLocaleTimeString()}</div>
                </div>
                <span style="font-weight:700;color:#ff0000;font-size:13px;">
                    GHS ${parseFloat(s.total_amount).toFixed(2)}
                </span>
            </div>`
        ).join('');
    } catch { console.log('Could not load recent sales.'); }
}

function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
}

loadStats();
</script>

</body>
</html>
