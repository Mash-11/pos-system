<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronin Chopsticks — POS Login</title>
    <link rel="stylesheet" href="css/style.css">
     <!--For apple device-->
     <meta name="apple-mobile-web-app-capable" content="yes">
     <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
     <meta name="theme-color" content="#ff0000">
    <style>
        /* Login page styles */
        body {
     min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: url('images/banner.png') center center / cover no-repeat;
}

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 540px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.13);
        }

        /* Left panel — brand */
        .login-brand {
            flex: 1;
            background:   #ff0000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 36px;
            gap: 24px;
        }

        .login-brand img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }

        .brand-tagline {
            color: rgba(255,255,255,0.85);
           font-size: 13px;
           text-align: center;
           line-height: 1.6;
           max-width: 200px;
}



        /* Right panel — form */
        .login-form-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 40px;
        }

        .login-heading {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .login-sub {
            font-size: 13.5px;
            color: #888;
            margin-bottom: 32px;
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #aaa;
        }

        .input-icon-wrap .form-control {
            padding-left: 40px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background:  #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            font-family: inherit;
        }

        .login-btn:hover { background: #cc0000; }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .divider {
            border: none;
            border-top: 1px solid #ebebeb;
            margin: 24px 0;
        }

        .default-creds {
            background: #fdf0ef;
            border: 1px solid #f5c6c2;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: #888;
            line-height: 1.8;
        }

        .default-creds strong { color: #c0392b; }
    </style>
</head>
<body>

<div class="login-wrapper">

    <!-- Left: Brand Panel -->
    <div class="login-brand">
        <img src="images/logo-circle.png" alt="Ronin Chopsticks Logo">
        <p class="brand-tagline">
            <span>Ronin Chopsticks</span><br>
            Point of Sale System<br>
            — Staff Access Only —
        </p>
    </div>

    <!-- Right: Login Form -->
    <div class="login-form-panel">
        <h1 class="login-heading">Welcome back</h1>
        <p class="login-sub">Sign in to your account to continue</p>

        <div class="alert alert-error" id="errorAlert"></div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <input type="text" id="username" class="form-control"
                    placeholder="Enter your username" autocomplete="off">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input type="password" id="password" class="form-control"
                    placeholder="Enter your password">
            </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            Sign In
        </button>

        <hr class="divider">

        <div class="default-creds">
            <strong>Default admin credentials:</strong><br>
            Username: <strong>admin</strong><br>
            Password: <strong>admin123</strong>
        </div>
    </div>

</div>

<script>
    // Check if already logged in
    const token = localStorage.getItem('pos_token');
    if (token) window.location.href = 'pos.html';

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn      = document.getElementById('loginBtn');
        const alert    = document.getElementById('errorAlert');

        // Hide previous errors
        alert.classList.remove('show');

        if (!username || !password) {
            showError('Please enter both username and password.');
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Signing in...';

        try {
            const res  = await fetch('http://localhost:3000/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                // Save token and user info
                localStorage.setItem('pos_token', data.token);
                localStorage.setItem('pos_user',  JSON.stringify(data.user));
                // Redirect to POS screen
                const role = data.user.role;
            if (role === 'cashier') {
                    window.location.href = 'pos.html';
            } else {
                    window.location.href = 'dashboard.html';
                    }
            } else {
                showError(data.message || 'Invalid username or password.');
            }

        } catch (err) {
            showError('Cannot connect to server. Make sure the backend is running.');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Sign In';
        }
    }

    function showError(msg) {
        const alert = document.getElementById('errorAlert');
        alert.textContent = msg;
        alert.classList.add('show');
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
